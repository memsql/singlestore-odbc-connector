name: Build & Test (Linux)
runs-on: ubuntu-latest

runs:
  using: "composite"
  steps:
    - name: Remove unnecessary pre-installed toolchains for free disk spaces
      shell: bash
      run: |
        echo "=== BEFORE ==="
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        docker system prune -af || true
        sudo apt-get clean
        echo "=== AFTER ==="
        df -h
    - name: Checkout code
      shell: bash
      uses: actions/checkout@v4
    - name: Set up dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc g++ libglib2.0 libsecret-1-dev libkrb5-dev unixodbc unixodbc-dev odbcinst libodbc2
    - name: Setup test cluster
      shell: bash
      run: ./.github/scripts/setup-cluster.sh
    - name: Build project
      shell: bash
      run:  ./.github/scripts/build-ubuntu.sh
    - name: Run tests
      shell: bash
      run: ./.github/scripts/run-tests-linux.sh
    # - name: Run browser auth tests  TODO: PLAT-7389 enable these tests
    #   run: ./test/odbc_browser_auth
