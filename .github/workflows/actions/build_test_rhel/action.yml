name: Build & Test (RHEL/CentOS)
description: "Composite action to build and test the ODBC connector on RHEL/CentOS"

runs:
  using: "composite"
  steps:
    - name: Set up dependencies
      shell: bash
      run: |
        # Install EPEL repository for additional packages
        dnf install -y epel-release

        # Update package lists
        dnf update -y

        # Install build dependencies
        dnf groupinstall -y "Development Tools"
        dnf install -y cmake gcc gcc-c++ glib2-devel libsecret-devel krb5-devel unixODBC unixODBC-devel openssl-devel git which

    - name: Setup test cluster
      shell: bash
      run: ./.github/scripts/setup-cluster.sh

    - name: Build project
      shell: bash
      run: ./.github/scripts/build-linux.sh

    # - name: Run tests
    #   shell: bash
    #   run: ./.github/scripts/run-tests-linux.sh
